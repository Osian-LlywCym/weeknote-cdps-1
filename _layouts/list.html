---
layout: default
---

<main class="main">

  <div class="lbm-container lbm-markdown-output">
    {{ content }}
  </div>

 
    {% assign subpages=site.categories[page.section] | where:"lang", page.lang %}
    {% for p in subpages %}
<p><a href="{{site.baseurl}}{{ p.url }}">{{ p.title }}</a></p>
   <br>{{ site.t[page.lang].by | capitalize }} {{p.author}}
   <br> {{p.description}}</p>
    {% endfor %}


</main>
